services:
  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    restart: unless-stopped
    expose:
      - "80"

  server:
    build:
      context: .
      dockerfile: docker/server.Dockerfile
    restart: unless-stopped
    environment:
      - JWT_SECRET=${JWT_SECRET:-dev-secret-change-in-production}
      - DATABASE_PATH=/data/kiekskoloj.db
      - UPLOAD_PATH=/data/uploads
      - PORT=3006
      - NODE_ENV=production
    volumes:
      - server_data:/data
    expose:
      - "3006"

volumes:
  server_data:
